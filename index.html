<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>?????</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #120b0e;
            background-image: radial-gradient(circle at 20% 30%, #2f1a21 0%, #0f080b 80%);
            min-height: 100vh;
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 30%, rgba(8, 3, 5, 0.8) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .title-section {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .title-section h1 {
            font-size: clamp(40px, 10vw, 72px);
            font-weight: 800;
            color: #ffe2ec;
            text-shadow: 0 6px 0 #911f44, 0 12px 24px #00000080;
            letter-spacing: 2px;
            font-family: 'Montserrat', 'Arial Black', sans-serif;
        }

        .flower-decoration {
            text-align: center;
            font-size: 30px;
            margin: 20px 0;
            opacity: 0.6;
        }

        .photos {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 20px 0;
        }

        .photo-item {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: #24161d;
            border-radius: 32px;
            padding: 15px;
            border: 2px solid #f594b2;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.7), 0 0 20px rgba(255, 100, 150, 0.3);
            transition: transform 0.3s ease;
        }

        .photo-item:hover {
            transform: scale(1.02);
            box-shadow: 0 30px 50px rgba(255, 100, 150, 0.4);
        }

        .photo-image {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 24px;
            background: #ffedf2;
            display: block;
        }

        .placeholder {
            width: 100%;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: #ff99bb;
            background: linear-gradient(145deg, #2c1a22, #1f1217);
            border-radius: 24px;
            border: 2px dashed #ff99bb;
        }

        .greeting-section {
            text-align: center;
            padding: 60px 20px 80px;
            max-width: 800px;
            margin: 0 auto;
        }

        .greeting-card {
            background: rgba(255, 240, 245, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 40px 30px;
            border: 2px solid #ff99bb;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .greeting-text {
            font-size: clamp(24px, 5vw, 36px);
            color: #fff0f5;
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .greeting-signature {
            font-size: clamp(20px, 4vw, 28px);
            color: #ffb0c8;
            font-style: italic;
            border-top: 2px dashed #ff99bb;
            padding-top: 20px;
            margin-top: 20px;
        }

        .heart {
            color: #ff6b95;
            font-size: 40px;
            animation: heartbeat 1.5s ease infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @media (max-width: 600px) {
            .gallery-container {
                padding: 10px;
            }
            .photo-item {
                padding: 10px;
            }
            .greeting-card {
                padding: 30px 20px;
            }
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div class="vignette"></div>
    <canvas id="confetti-canvas"></canvas>

    <div class="gallery-container">
        <div class="title-section">
            <h1>С 8 МАРТА</h1>
            <div class="flower-decoration">🌷 🌸 🌺</div>
        </div>

        <div class="photos" id="photosContainer">
            <!-- Фото будут добавлены через JavaScript -->
        </div>

        <div class="greeting-section">
            <div class="greeting-card">
                <div class="greeting-text">
                    С Международным женским днём!
                </div>
                <div class="greeting-text">
                    Пусть каждый день дарит улыбки <br>
                    и тепло близких людей.
                </div>
                <div class="heart">❤️</div>
                <div class="greeting-signature">
                    (А qr код ты можешь использовать
                    на Мартьянова 31)<br>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Функция для создания массива имен файлов
            function generatePhotoNames() {
                const names = [];
                
                // photo1 - photo14
                for (let i = 1; i <= 14; i++) {
                    names.push(`photo${i}.jpg`);
                }
                
                // photo14 — копия до photo14 — копия (20)
                for (let i = 1; i <= 20; i++) {
                    if (i === 1) {
                        names.push(`photo14 — копия.jpg`);
                    } else {
                        names.push(`photo14 — копия (${i}).jpg`);
                    }
                }
                
                // photo15
                names.push(`photo15.jpg`);
                
                // photo14 — копия (21) до photo14 — копия (40)
                for (let i = 21; i <= 40; i++) {
                    names.push(`photo14 — копия (${i}).jpg`);
                }
                
                // Добавляем otkr.jpg в самый конец
                names.push(`otkr.jpg`);
                
                return names;
            }

            // Получаем массив имен (теперь 57 фото)
            const photoNames = generatePhotoNames();
            
            // Контейнер для фото
            const photosContainer = document.getElementById('photosContainer');
            
            // Создаем элементы для каждого фото
            photoNames.forEach((name, index) => {
                const photoItem = document.createElement('div');
                photoItem.className = 'photo-item';
                
                const img = document.createElement('img');
                img.src = name;
                img.alt = `Фото ${index + 1}`;
                img.className = 'photo-image';
                img.loading = 'lazy';
                
                // Плейсхолдер на случай ошибки загрузки
                const placeholder = document.createElement('div');
                placeholder.className = 'placeholder';
                placeholder.style.display = 'none';
                placeholder.textContent = '🌸';
                
                // Обработчик ошибки загрузки
                img.onerror = function() {
                    this.style.display = 'none';
                    placeholder.style.display = 'flex';
                };
                
                photoItem.appendChild(img);
                photoItem.appendChild(placeholder);
                photosContainer.appendChild(photoItem);
            });

            // Конфетти
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            let width, height, particles = [], animId = null;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height - height;
                    this.size = Math.random() * 9 + 4;
                    this.speedY = Math.random() * 5 + 4;
                    this.speedX = (Math.random() - 0.5) * 1.8;
                    this.color = `hsl(${Math.random() * 30 + 330}, 85%, 65%)`;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    if (this.y > height) {
                        this.y = -10;
                        this.x = Math.random() * width;
                    }
                }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function startConfetti() {
                if (animId) stopConfetti();
                for (let i = 0; i < 80; i++) particles.push(new Particle());
                function animate() {
                    ctx.clearRect(0, 0, width, height);
                    particles.forEach(p => { p.update(); p.draw(); });
                    animId = requestAnimationFrame(animate);
                }
                animate();
            }

            function stopConfetti() {
                if (animId) cancelAnimationFrame(animId);
                animId = null;
                ctx.clearRect(0, 0, width, height);
                particles = [];
            }

            startConfetti();
        })();
    </script>
</body>
</html>
